<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Table Talks Australia - Home</title>
<meta name="description" content="Redefining the way we gather.">
<link rel="icon" href="images/Br0FZT81voEvFzJO7TdDL168e0.jpg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div data-include="header-studio"></div>

<main>
  <section class="section-cream simple-page-hero">
    <div class="wrap form-grid">
      <div>
        <h1>The Tables We Set.</h1>
        <p class="muted" style="margin-top:16px; max-width:360px;">Join our mailing list to receive early access to upcoming gatherings, collaborations, and immersive experiences.</p>
      </div>
      <form action="https://formspree.io/f/REPLACE_WITH_FORM_ID" method="POST" style="display:flex; flex-direction:column; gap:20px; max-width:360px;">
        <div>
          <span class="field-label">Name</span>
          <input type="text" name="name" placeholder="Jane Smith" required>
        </div>
        <div>
          <span class="field-label">Email</span>
          <input type="email" name="email" placeholder="name@email.com" required>
        </div>
        <input type="hidden" name="_subject" value="New mailing list signup — Join page">
        <button type="submit" class="btn btn-dark" style="width:100%;">Submit</button>
      </form>
    </div>
  </section>
</main>

<div data-include="footer"></div>

<script src="js/site.js" data-base=""></script>
</body>
</html>
